  :root {
    --bg: #0E0D0B;

    --cream: #EFE7D6;
    --ember: #B8651F;
    --ember-light: #D4834A;
    --muted: #6b6560;
    --selected-border: #B8651F;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--cream); font-family: 'Georgia', serif; padding: 40px 24px 80px; }
  h1 { font-size: 28px; font-weight: 400; letter-spacing: 0.04em; margin-bottom: 8px; }
  .subtitle { color: var(--muted); font-size: 14px; font-family: monospace; margin-bottom: 48px; }
  .sphere-section { margin-bottom: 56px; }
  .sphere-title {
    font-size: 13px; font-family: monospace; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ember); margin-bottom: 16px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .card {
    position: relative; cursor: pointer; border-radius: 6px; overflow: hidden;
    border: 2px solid transparent; transition: border-color 0.2s, transform 0.15s;
  }
  .card:hover { transform: scale(1.02); }
  .card.selected { border-color: var(--selected-border); }
  .card.selected::after {
    content: '✓'; position: absolute; top: 8px; right: 8px;
    background: var(--ember); color: white;
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-family: monospace; font-weight: bold;
    display: grid; place-items: center;
  }
  .card img {
    width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block;
    background: var(--surface);
  }
  .card-alt {
    padding: 8px 10px; font-size: 11px; color: var(--muted);
    font-family: monospace; line-height: 1.4;
    background: var(--surface); min-height: 44px;
  }
  #summary {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 12px 24px; font-family: monospace; font-size: 12px;
    color: var(--cream); display: flex; gap: 16px; align-items: center;
    flex-wrap: wrap;
  }
  #summary-count { color: var(--ember); }
  #copy-btn {
    margin-left: auto; background: var(--ember); color: white;
    border: none; padding: 8px 20px; border-radius: 4px;
    font-family: monospace; font-size: 12px; cursor: pointer;
    transition: background 0.2s;
  }
  #copy-btn:hover { background: var(--ember-light); }
  #copied-msg { color: var(--ember); display: none; }
</style>

const selected = new Set();

function render() {
  const container = document.getElementById('spheres');
  container.innerHTML = '';
  for (const [sphere, images] of Object.entries(data)) {
    const section = document.createElement('div');
    section.className = 'sphere-section';
    section.innerHTML = `<div class="sphere-title">${sphere}</div><div class="grid" id="grid-${sphere}"></div>`;
    container.appendChild(section);
    const grid = section.querySelector('.grid');
    images.forEach((img, idx) => {
      const key = `${sphere}::${img.src}`;
      const card = document.createElement('div');
      card.className = 'card' + (selected.has(key) ? ' selected' : '');
      card.innerHTML = `<img src="${img.src}" alt="${img.alt}" loading="lazy"><div class="card-alt">${img.alt}</div>`;
      card.onclick = () => {
        if (selected.has(key)) selected.delete(key);
        else selected.add(key);
        card.classList.toggle('selected');
        document.getElementById('summary-count').textContent = selected.size;
      };
      grid.appendChild(card);
    });
  }
}

function copySelected() {
  const lines = [];
  for (const [sphere, images] of Object.entries(data)) {
    const sphereSelected = images.filter(img => selected.has(`${sphere}::${img.src}`));
    if (sphereSelected.length) {
      lines.push(`\n## ${sphere}`);
      sphereSelected.forEach(img => lines.push(`- ${img.src}\n  ${img.alt}`));
    }
  }
  if (!lines.length) { alert('Выбери хотя бы одно изображение'); return; }
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const msg = document.getElementById('copied-msg');
    msg.style.display = 'inline';
    setTimeout(() => msg.style.display = 'none', 2000);
  });
}

render();
