<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Elyne · документ</title>
<style>
  :root { --bg:#fafaf7; --ink:#2a241d; --muted:#6b6357; --line:#e5e3dc; --accent:#c4a95e; --card:#ffffff; }
  body { font-family: -apple-system, "Inter", system-ui, sans-serif; max-width: 820px; margin: 0 auto; padding: 36px 18px 64px; color: var(--ink); line-height: 1.65; background: var(--bg); }
  h1 { font-size: 28px; font-weight: 600; margin: 0 0 8px; letter-spacing: -0.01em; }
  h2 { font-size: 21px; font-weight: 600; margin: 36px 0 12px; padding-top: 16px; border-top: 1px solid var(--line); color: #1f1a14; }
  h3 { font-size: 17px; font-weight: 600; margin: 22px 0 6px; color: #2f2820; }
  h4 { font-size: 15px; font-weight: 600; margin: 16px 0 4px; }
  p { margin: 8px 0 12px; }
  ul, ol { padding-left: 22px; margin: 8px 0 14px; }
  li { margin: 4px 0; }
  blockquote { margin: 16px 0; padding: 12px 18px; background: #f0efe9; border-radius: 10px; color: var(--muted); font-size: 15px; }
  blockquote p { margin: 4px 0; }
  hr { border: 0; border-top: 1px solid var(--line); margin: 32px 0; }
  code { background: #f3f1ea; padding: 1px 6px; border-radius: 5px; font-size: 13.5px; color: #4a3f30; }
  pre { background: #1f1a14; color: #f0e9d8; padding: 14px 16px; border-radius: 10px; overflow-x: auto; font-size: 13.5px; }
  pre code { background: transparent; color: inherit; padding: 0; }
  a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; }
  a:hover { border-bottom-color: var(--accent); }
  strong { color: #1f1a14; }
  em { color: var(--muted); }
  .footer { margin-top: 48px; padding-top: 16px; border-top: 1px solid var(--line); font-size: 12.5px; color: var(--muted); font-style: italic; }
</style>
</head>
<body>
<!DOCTYPE html>
<p><html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elyne · Hero v2</title></p>
<style>
  :root { --bg: #0E0D0B; --cream: #EFE7D6; --ember: #B8651F; --muted: #6b6560; --border: #2a2620; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--cream); font-family: Georgia, serif; padding: 32px 20px 60px; }
  h1 { font-size: 22px; font-weight: 400; margin-bottom: 6px; }
  .sub { font-family: monospace; font-size: 12px; color: var(--muted); margin-bottom: 32px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .card { cursor: pointer; border-radius: 6px; overflow: hidden; border: 3px solid transparent; transition: border-color 0.2s, transform 0.15s; position: relative; }
  .card:hover { transform: scale(1.01); }
  .card.selected { border-color: var(--ember); }
  .card.selected::after { content: '✓'; position: absolute; top: 10px; right: 10px; background: var(--ember); color: #fff; width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; font-family: monospace; font-weight: bold; font-size: 14px; }
  .card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; object-position: center top; display: block; background: #181612; }
  .card .overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(14,13,11,0.15) 0%, rgba(14,13,11,0.6) 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 24px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .card:hover .overlay { opacity: 1; }
  .overlay-logo { font-size: 26px; font-weight: 300; letter-spacing: 0.12em; color: var(--cream); }
  .overlay-tag { font-family: monospace; font-size: 11px; color: rgba(239,231,214,0.7); margin-top: 6px; letter-spacing: 0.06em; }
  .label { padding: 10px 12px; background: #181612; font-family: monospace; font-size: 11px; color: var(--muted); }
</style>
<p></head></p>
<body>

<h1>Elyne · Hero — жизнеутверждающие</h1>
<p class="sub">Наведи — увидишь как будет с логотипом. Нажми чтобы выбрать.</p>

<div class="grid" id="grid"></div>

<script>
const candidates = [
  { f: "hero-v2-01-wheat-field-smile.jpg",  label: "Пшеничное поле — улыбка, руки в стороны" },
  { f: "hero-v2-02-laugh-wind-sun.jpg",     label: "Смех, ветер, солнце сзади — энергия" },
  { f: "hero-v2-03-dress-sunset-walk.jpg",  label: "Идёт по траве, платье на ветру — закат" },
  { f: "hero-v2-04-laughing-hair-wind.jpg", label: "Смеётся, волосы на ветру — жизнь" },
  { f: "hero-v2-05-mountain-arms-out.jpg",  label: "На горе, руки в стороны — вершина" },
  { f: "hero-v2-06-field-arms-sunset.jpg",  label: "В поле, руки открыты — закат за спиной" },
  { f: "hero-v2-07-facing-sun-arms.jpg",    label: "Лицом к солнцу, руки вперёд — навстречу" },
  { f: "hero-v2-08-ocean-table-wine.jpg",   label: "За столиком у океана — манящий момент" },
];

const grid = document.getElementById('grid');
candidates.forEach(c => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <img src="${c.f}" alt="${c.label}" loading="lazy">
    <div class="overlay">
      <div class="overlay-logo">Elyne</div>
      <div class="overlay-tag">Визуализируй лучшую версию себя</div>
    </div>
    <div class="label">${c.label}</div>
  `;
  card.onclick = () => {
    document.querySelectorAll('.card').forEach(el => el.classList.remove('selected'));
    card.classList.add('selected');
    navigator.clipboard.writeText(c.f + '\n' + c.label).catch(() => {});
    alert('Выбрал: ' + c.label);
  };
  grid.appendChild(card);
});
</script>
</body>
<p></html></p>
<div class="footer">Elyne · документ опубликован для команды. Канон лежит в приватном репо Monada — здесь срез на момент публикации.</div>
</body>
</html>
