const selected = new Set();

function render() {
  const root = document.getElementById('root');
  for (const [key, sec] of Object.entries(DATA)) {
    const section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = `
      <div class="section-head">
        <div class="section-title">${sec.label}</div>
        <div class="section-desc">${sec.desc}</div>
        <div class="section-count">${sec.images.length} шт</div>
      </div>
      <div class="grid" id="grid-${key}"></div>
    `;
    root.appendChild(section);
    const grid = document.getElementById(`grid-${key}`);
    sec.images.forEach(img => {
      const k = `${key}::${img.f}`;
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<img src="${BASE}${img.f}" alt="${img.alt}" loading="lazy"><div class="card-caption">${img.alt.slice(0,70)}${img.ph ? ' · ' + img.ph : ''}</div>`;
      card.onclick = () => {
        selected.has(k) ? selected.delete(k) : selected.add(k);
        card.classList.toggle('selected');
        document.getElementById('count').textContent = selected.size;
      };
      grid.appendChild(card);
    });
  }
}

function copySelected() {
  const lines = [];
  for (const [key, sec] of Object.entries(DATA)) {
    const picks = sec.images.filter(img => selected.has(`${key}::${img.f}`));
    if (picks.length) {
      lines.push(`\n## ${sec.label}`);
      picks.forEach(img => lines.push(`- ${img.f}\n  ${img.alt}`));
    }
  }
  if (!lines.length) { alert('Выбери хотя бы одно'); return; }
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const m = document.getElementById('copied');
    m.style.display = 'inline';
    setTimeout(() => m.style.display = 'none', 2000);
  });
}

render();
